server {
    listen 80;
    server_name _;

    # Basic auth for team-only access
    auth_basic "Unity Video Producer";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Proxy to FastAPI backend
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;  # Kling takes up to 6 minutes
        proxy_send_timeout 600s;
    }

    # Serve frontend static files
    location / {
        root /var/www/unity-video-producer/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # Serve video outputs directly
    location /outputs/ {
        alias /var/www/unity-video-producer/backend/outputs/;
        add_header Content-Disposition "attachment";
    }

    # Large file uploads
    client_max_body_size 100M;
}
